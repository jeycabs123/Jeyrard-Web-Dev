<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Activity 9</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .container{
            width:350px;
            padding:40px 30px;
            border-radius:20px;
            text-align:center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            color:white;
            animation: fadeIn 1s ease;
        }

        .container h2{
            margin-bottom:25px;
            font-size:28px;
            letter-spacing:1px;
        }

        button{
            padding:12px 28px;
            border:none;
            border-radius:30px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s ease;
            font-weight:bold;
        }

        button:hover{
            transform: scale(1.08);
            box-shadow:0 5px 15px rgba(0,114,255,0.5);
        }

        #demo{
            margin-top:25px;
            font-size:18px;
            line-height:1.5;
            color:#f1f1f1;
            min-height:50px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>

    <script>
        function myFunction() {
            let txt;
            let fullName = prompt("Full name :", "Enter full name here");

            if (fullName == null || fullName == "") {
                txt = "⚠ The field is required!";
            } else {
                txt = "✨ Hello, " + fullName + "! How are you today?";
            }

            document.getElementById("demo").innerHTML = txt;
        }
    </script>
</head>

<body>

    <div class="container">
        <h2>JavaScript Prompt</h2>

        <button onclick="myFunction()">
            Click Here
        </button>

        <p id="demo"></p>
    </div>

</body>
</html>
