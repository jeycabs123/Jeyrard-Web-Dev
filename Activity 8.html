<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Activity 8</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .container{
            background:white;
            padding:40px;
            width:350px;
            text-align:center;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        .container h2{
            margin-bottom:20px;
            color:#1e3c72;
            font-size:30px;
        }

        .container p{
            color:#555;
            margin-bottom:25px;
            font-size:15px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:30px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.08);
            background: linear-gradient(135deg, #2a5298, #1e3c72);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(-20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>

    <script>
        function myFunction() {
            var name = "MJ";
            alert("Hi " + name + "! Welcome to JavaScript Alert Box 🎉");
        }
    </script>
</head>

<body>

    <div class="container">
        <h2>JavaScript Alert</h2>
        <p>Click the button below to display an alert message.</p>

        <button onclick="myFunction()">
            Click Here!
        </button>
    </div>

</body>
</html>
