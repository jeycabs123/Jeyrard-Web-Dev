<!DOCTYPE html>

<html>

    <head>
        <h1>
            <b>User Information Form</b>
        </h1>
    </head>


    <body>
        <form action="" method="post">
            <p>First Name</p>
            <input type="text" name="Firstname" required>
            <p>Last Name</p>
            <input type="text" name="Lastname" required>
            <p>Age</p>
            <input type="number" name="Age" required>

            <p>Gender</p>
            <input type="radio" id="male" name="Gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="Gender" value="female">
            <label for="female">Female</label><br>


            <p>Hobbies</p>

            <input type="checkbox" id="Cooking" name="interest" value="Cooking">
            <label for="Cooking">Cooking</label><br>
            <input type="checkbox" id="Basketball" name="interest" value="Basketball">
            <label for="Basketball">Basketball</label><br>

            <input type="checkbox" id="Playing" name="interest" value="Playing">
            <label for="Playing">Playing E-Games</label><br>
            <input type="checkbox" id="Reading" name="interest" value="Reading">
            <label for="Reading">Reading Books</label><br>

            <input type="checkbox" id="Planting" name="interest" value="Planting">
            <label for="Planting">Planting</label><br>
            <input type="checkbox" id="Sleeping" name="interest" value="Sleeping">
            <label for="Reading">Sleeping</label><br>

            <p>Year Level</p>
            <select name="Year">
                <option value="1-Year">1st Year</option>
                <option value="2-Year">2nd Year</option>
                <option value="3-Year">3rd Year</option>
                <option value="4-Year">4th Year</option>
            </select><br><br>


            <button type="submit">Enter</button>
            <button type="reset">Reset</button>


            <input type="submit" value="Send Data">
        </form>

    </body>





</html>
