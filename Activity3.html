<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Gallery Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding:20px;
}

.gallery-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:20px;
    width:90%;
    max-width:1000px;
}

.flag-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    text-align:center;
    transition:0.3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    cursor:pointer;
}

.flag-card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

.flag-card img{
    width:100%;
    height:120px;
    object-fit:cover;
    display:block;
}

.country-name{
    padding:12px;
    font-size:16px;
    font-weight:bold;
    color:white;
    background:rgba(0,0,0,0.3);
    letter-spacing:1px;
}

h1{
    position:absolute;
    top:20px;
    color:white;
    font-size:28px;
    text-align:center;
}
</style>
</head>

<body>

<h1>🌍 Flag Gallery</h1>

<div class="gallery-container">

    <div class="flag-card">
        <img src="images/flag1.webp" alt="Switzerland">
        <div class="country-name">Switzerland</div>
    </div>

    <div class="flag-card">
        <img src="images/flag2.svg" alt="Germany">
        <div class="country-name">Germany</div>
    </div>

    <div class="flag-card">
        <img src="images/flag3.png" alt="France">
        <div class="country-name">France</div>
    </div>

    <div class="flag-card">
        <img src="images/flag4.webp" alt="Japan">
        <div class="country-name">Japan</div>
    </div>

    <div class="flag-card">
        <img src="images/flag5.svg" alt="Canada">
        <div class="country-name">Canada</div>
    </div>

    <div class="flag-card">
        <img src="images/flag6.png" alt="China">
        <div class="country-name">China</div>
    </div>

</div>

</body>
</html>
