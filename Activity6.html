<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activity 11</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Create new html file save as activity11.html</h1>
<div class="container">
<!-- FOR LOOP -->
<div class="box">
<h2>For Loop</h2>
<label>Enter number:</label>
<input type="number" id="forNum"><br>
<label>Enter text:</label>
<input type="text" id="forText"><br>
<button onclick="showFor()">Show</button>
<button onclick="clearFor()">Clear</button>
<ol id="forOutput"></ol>
</div>
<!-- WHILE LOOP -->
<div class="box">
<h2>While Loop</h2>
<label>Enter number:</label>
<input type="number" id="whileNum"><br>
<label>Enter text:</label>
<input type="text" id="whileText"><br>
<button onclick="showWhile()">Show</button>
<button onclick="clearWhile()">Clear</button>
<ol id="whileOutput"></ol>
</div>
<div class="box">
<h2>Do-While Loop</h2>
<label>Enter number:</label>
<input type="number" id="doNum"><br>
<label>Enter text:</label>
<input type="text" id="doText"><br>
<button onclick="showDoWhile()">Show</button>
<button onclick="clearDo()">Clear</button>
<ol id="doOutput"></ol>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
