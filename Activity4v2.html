<!DOCTYPE html>
<html>
<head>
    <title>User Information Form</title>
</head>

<body style="
    background: linear-gradient(to right, #dbeeff, #eef6ff);
    font-family: Arial, sans-serif;
">

<h1 style="
    text-align:center;
    color:#0b5394;
    text-shadow:1px 1px 3px #a4c2f4;
">
    User Information Form
</h1>

<form>
    <table 
        style="
            margin:auto;
            background-color:#ffffff;
            border-collapse:collapse;
            width:55%;
            border-radius:12px;
            box-shadow:0 8px 15px rgba(0,0,0,0.15);
            overflow:hidden;
        "
        cellpadding="10"
    >

        <tr style="background-color:#cfe2f3;">
            <td>First Name</td>
            <td>
                <input type="text" style="
                    width:95%;
                    padding:6px;
                    border-radius:6px;
                    border:1px solid #6fa8dc;
                ">
            </td>
        </tr>

        <tr>
            <td>Last Name</td>
            <td>
                <input type="text" style="
                    width:95%;
                    padding:6px;
                    border-radius:6px;
                    border:1px solid #6fa8dc;
                ">
            </td>
        </tr>

        <tr style="background-color:#cfe2f3;">
            <td>Age</td>
            <td>
                <input type="number" style="
                    width:95%;
                    padding:6px;
                    border-radius:6px;
                    border:1px solid #6fa8dc;
                ">
            </td>
        </tr>

        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="Gender"> Male
                <input type="radio" name="Gender"> Female
            </td>
        </tr>

        <tr style="background-color:#cfe2f3;">
            <td>Hobbies</td>
            <td>
                <input type="checkbox"> Cooking<br>
                <input type="checkbox"> Basketball<br>
                <input type="checkbox"> Playing E-Games<br>
                <input type="checkbox"> Reading Books<br>
                <input type="checkbox"> Planting<br>
                <input type="checkbox"> Sleeping
            </td>
        </tr>

        <tr>
            <td>Year Level</td>
            <td>
                <select style="
                    width:98%;
                    padding:6px;
                    border-radius:6px;
                    border:1px solid #6fa8dc;
                ">
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>
            </td>
        </tr>

        <tr style="background-color:#eaf2fb;">
            <td colspan="2" style="text-align:center;">
                <button 
                    type="submit"
                    style="
                        background: linear-gradient(to right, #0b5394, #3d85c6);
                        color:white;
                        border:none;
                        padding:10px 20px;
                        border-radius:20px;
                        cursor:pointer;
                        box-shadow:0 4px 6px rgba(0,0,0,0.2);
                    "
                >
                    Submit
                </button>

                <button 
                    type="reset"
                    style="
                        background: linear-gradient(to right, #6fa8dc, #9fc5e8);
                        color:white;
                        border:none;
                        padding:10px 20px;
                        border-radius:20px;
                        cursor:pointer;
                        box-shadow:0 4px 6px rgba(0,0,0,0.2);
                        margin-left:10px;
                    "
                >
                    Reset
                </button>
            </td>
        </tr>

    </table>
</form>

</body>
</html>
