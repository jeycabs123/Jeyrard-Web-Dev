<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Date & Time</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 16px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        backdrop-filter: blur(10px);
        width: 300px;
    }

    h2 {
        margin-bottom: 20px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #00c6ff;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        background: #0072ff;
        transform: scale(1.05);
    }

    #demo {
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
    }
</style>

</head>

<body>

<div class="card">
    <h2>My First JavaScript</h2>

    <button type="button" onclick="document.getElementById('demo').innerHTML = Date()">
        Show Date & Time
    </button>

    <p id="demo"></p>
</div>

</body>
</html>
